# =============================================================
#  SITE CONFIG — edit the values below to personalize the site.
#  This is the single source of truth for your name, links, etc.
# =============================================================

# --- Who you are -------------------------------------------------
name: "Yaxin Ma"
tagline: "Ph.D. student at the University of Florida working on trustworthy LLMs and agents."
email: "yaxinma@ufl.edu"

# Your GitHub username. Project links and the site URL derive from this.
github_username: "voidwalker-M"

# Optional extra links (leave blank "" to hide any of them)
google_scholar: ""        # e.g. "https://scholar.google.com/citations?user=XXXX"
twitter: ""               # e.g. "https://twitter.com/handle"
linkedin: "https://www.linkedin.com/in/yaxin-ma"

# --- Site URL ----------------------------------------------------
# For a personal site, create a GitHub repo named  <username>.github.io
# Then set:
#   url:     "https://<username>.github.io"
#   baseurl: ""
#
# For a project repo (any other name, e.g. "website"), set:
#   url:     "https://<username>.github.io"
#   baseurl: "/website"
url: "https://voidwalker-m.github.io"
baseurl: ""

# --- Build settings (you normally don't need to touch these) -----
title: "Yaxin Ma"
description: "Yaxin Ma — Ph.D. student at the University of Florida working on trustworthy LLMs and agents, evaluation, and uncertainty quantification."
permalink: /articles/:year/:month/:day/:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# jekyll-feed: put the Atom feed at /feed.xml
feed:
  path: feed.xml

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
